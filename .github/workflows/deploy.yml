name: Deploy to Hostinger

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: projectworks-8b692.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: projectworks-8b692
          VITE_FIREBASE_STORAGE_BUCKET: projectworks-8b692.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: '876322383528'
          VITE_FIREBASE_APP_ID: '1:876322383528:web:654de92bee2c70015bc49d'
          VITE_FIREBASE_MEASUREMENT_ID: G-3KCTDBLGR9
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
          VITE_APP_URL: https://gray-barracuda-245114.hostingersite.com
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}

      - name: Copy API files into dist
        run: |
          mkdir -p dist/api
          cp public/api/jobtread-proxy.php dist/api/jobtread-proxy.php
          cp public/api/.htaccess dist/api/.htaccess

      - name: Deploy to Hostinger via SSH
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 151.106.104.229
          username: u959857201
          password: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
          port: 65002
          source: 'dist/*'
          target: '/home/u959857201/domains/gray-barracuda-245114.hostingersite.com/public_html'
          strip_components: 1
          rm: true
